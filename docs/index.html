low 100% wear when test is aborted)</h4><p data-v-cd317fd0> When a test is aborted before the chain reaches 100% wear, typically because the chain is deemed too worn already, or if further testing would not provide useful insights (e.g. for private lubricants showing poor results early on). The lubricant receives 1000 km for each completed block, plus an extrapolation for the next block based on the average wear rate seen so far. </p><p class="example" data-v-cd317fd0> Example: A lubricant wore the chain to 74% in block 1 and the test was stopped. The score is 1000 km ÷ 0.74 = <strong data-v-cd317fd0>1351 km</strong>. This can be a slightly generous estimate, as it assumes the upcoming block would be as demanding as the blocks already completed — in reality, later blocks tend to be harder. </p><p data-v-cd317fd0> It is not possible to increase the score by more than 1000km from the extrapolation, and all lubricants where the 1000km extrapolation cap was hit are marked with a comment, indicating that Main Test kilometers were truncated. </p>`,12),L(`p`,vV,[t[29]||=z(` Example: A private immersive wax test has reached a total of 40% of wear in the first three blocks of testing. The test was aborted because it was already clear this wax was not performing as hoped. The formula would indicate 3000km ÷ 0.5 = 7500km as score, but since that would be more than 1000km above the actually completed 3000km, the result is truncated at `,-1),R(r,null,{default:Hn(()=>[...t[28]||=[z(`4000 km`,-1)]]),_:1}),t[30]||=z(`. `,-1)])]),L(`section`,yV,[t[44]||=L(`h3`,null,`Single Application Longevity`,-1),L(`p`,null,[t[34]||=z(` The Single Application Longevity test measures how long a single application of lubricant protects the chain before the chain needs to be re-lubed or replaced. Unlike the `,-1),R(bB,{section:`main-test`},{default:Hn(()=>[...t[33]||=[z(`Main Test`,-1)]]),_:1}),t[35]||=z(`, the lubricant is applied once and the chain is tested until wear thresholds are reached — no
